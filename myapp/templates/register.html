{% extends 'base.html' %}

{% block content %}
<h2>Register</h2>

<form method="POST" onsubmit="return validateForm()">
    {% csrf_token %}
    <input class="form-control mb-2" type="text" name="username" placeholder="Username">
    <input class="form-control mb-2" type="email" name="email" placeholder="Email">
    <input id="password" class="form-control mb-2" type="password" name="password" placeholder="Password">

    <button class="btn btn-success">Register</button>
</form>

{% endblock %}
